<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Book Slot - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-container {
            padding: 6rem 5% 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .slot-grid-container {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .slot-box {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border: 2px solid transparent;
        }
        .slot-box.available { background: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); }
        .slot-box.occupied { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); cursor: not-allowed; }
        .slot-box.selected { background: var(--primary-color); border-color: white; color: white; transform: scale(1.05); box-shadow: 0 0 15px var(--primary-color); }
        .slot-box i { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .slot-box span { font-weight: 700; font-size: 0.9rem; }

    </style>
</head>
<body>
    <nav class="navbar glass">
        <a href="dashboard-new.html" class="nav-brand">
            <i class="fas fa-parking" style="color: var(--primary-color);"></i>
            SmartPark
        </a>
        <div class="nav-links">
            <a href="dashboard-new.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Back to Dashboard</a>
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="booking-container fade-in">
        <div style="margin-bottom: 2rem;">
            <h2>Book Parking Slot</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Fill in the details to secure your spot.</p>
        </div>

        <div class="booking-grid">
            <div class="booking-form-card glass">
                <form id="bookingForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <select id="citySelect" class="form-control" required style="appearance: none;">
                                <option value="" disabled selected>Select City</option>
                            </select>
                            <i class="fas fa-chevron-down" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                            <label for="citySelect" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">City</label>
                        </div>
                        <div class="form-group">
                            <select id="placeSelect" class="form-control" required style="appearance: none;" disabled>
                                <option value="" disabled selected>Select Place</option>
                            </select>
                            <i class="fas fa-chevron-down" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                            <label for="placeSelect" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">Place</label>
                        </div>
                    </div>

                    <div class="form-group" style="display: none;">
                        <input type="hidden" id="selectedSlotId" required>
                    </div>

                    <div id="slotMapSection" style="display: none; margin-top: 1rem;">
                        <p style="font-weight: 600; margin-bottom: 0.5rem;"><i class="fas fa-th"></i> Select a Slot:</p>
                        <div class="slot-grid-container" id="slotGrid">
                            <!-- Populated by JS -->
                        </div>
                    </div>



                    <div class="form-group">
                        <input type="date" id="bookingDate" class="form-control" required>
                        <label for="bookingDate" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">Date</label>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <input type="time" id="startTime" class="form-control" required>
                            <label for="startTime" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">Start Time</label>
                        </div>
                        <div class="form-group">
                            <input type="time" id="endTime" class="form-control" required>
                            <label for="endTime" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">End Time</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <select id="vehicleNum" class="form-control" required style="appearance: none;">
                            <option value="" disabled selected>Select your vehicle</option>
                            <!-- Populated by JS -->
                        </select>
                        <i class="fas fa-chevron-down" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                        <label for="vehicleNum" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">Vehicle</label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; font-size: 1.1rem;">Confirm Booking</button>
                </form>
            </div>

            <div class="booking-summary glass">
                <div>
                    <h3 style="margin-bottom: 1.5rem; color: var(--text-color); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Booking Summary</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--text-muted);">Rate per hour</span>
                        <span id="displayFee" style="font-weight: 600; color: var(--text-color);">₹0.00</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--text-muted);">Selected Slot</span>
                        <span id="displaySlot" style="font-weight: 600; color: var(--primary-color); font-size: 1.2rem;">-</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span style="color: var(--text-muted);">Estimated Duration</span>
                        <span id="estDuration" style="font-weight: 600; color: var(--text-color);">-</span>
                    </div>

                </div>

                <div style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 1.2rem; font-weight: 600; color: var(--text-color);">Total Estimated</span>
                        <span id="estTotal" style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);">₹0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_BASE = getAPI_BASE();
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initDB(); // only for fee
            
            currentUserId = localStorage.getItem('user_id');
            try {
                // Populate user vehicles from API
                const vRes = await fetch(`${API_BASE}/vehicles/${currentUserId}`);
                const vResult = await vRes.json();
                
                const vSelect = document.getElementById('vehicleNum');
                if (vResult.status === 'success') {
                    vResult.data.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.id; // Store vehicle ID
                        opt.textContent = `${v.vehicle_number} (${v.vehicle_type.toUpperCase()})`;
                        vSelect.appendChild(opt);
                    });
                }

                // Populate Cities
                const cityRes = await fetch(`${API_BASE}/cities`);
                const cityResult = await cityRes.json();
                const citySelect = document.getElementById('citySelect');
                const placeSelect = document.getElementById('placeSelect');

                if (cityResult.status === 'success') {
                    cityResult.data.forEach(city => {
                        const opt = document.createElement('option');
                        opt.value = city.id;
                        opt.textContent = city.name;
                        citySelect.appendChild(opt);
                    });
                }

                citySelect.addEventListener('change', async () => {
                    const cityId = citySelect.value;
                    placeSelect.innerHTML = '<option value="" disabled selected>Select Place</option>';
                    placeSelect.disabled = true;
                    document.getElementById('slotMapSection').style.display = 'none';

                    if (cityId) {
                        const placeRes = await fetch(`${API_BASE}/places/${cityId}`);
                        const placeResult = await placeRes.json();
                        if (placeResult.status === 'success') {
                            placeResult.data.forEach(place => {
                                const opt = document.createElement('option');
                                opt.value = place.id;
                                opt.textContent = place.name;
                                placeSelect.appendChild(opt);
                            });
                            placeSelect.disabled = false;
                        }
                    }
                });

                placeSelect.addEventListener('change', async () => {
                    const placeId = placeSelect.value;
                    if (placeId) {
                        loadSlotMap(placeId);
                    }
                });

            } catch(e) {
                console.error("API Error:", e);
                showToast("Failed to load data from server", "error");
            }

            // Sync current fee from server
            const serverFee = await fetchSettingsFromServer();
            document.getElementById('displayFee').textContent = `₹${parseFloat(serverFee).toFixed(2)}`;

            // Auto-select based on URL
            const urlParams = new URLSearchParams(window.location.search);
            const cityParam = urlParams.get('city');
            const placeParam = urlParams.get('place');
            const slotParam = urlParams.get('slot');

            if (cityParam) {
                const citySelect = document.getElementById('citySelect');
                citySelect.value = cityParam;
                // Trigger change to load places
                citySelect.dispatchEvent(new Event('change'));
                
                // Wait a bit for places to load then select place
                setTimeout(async () => {
                    if (placeParam) {
                        const placeSelect = document.getElementById('placeSelect');
                        placeSelect.value = placeParam;
                        placeSelect.dispatchEvent(new Event('change'));

                        if (slotParam) {
                            // Wait for map to load then select slot
                            setTimeout(() => {
                                const slotBox = document.querySelector(`.slot-box[onclick*="selectSlot(${slotParam}"]`);
                                if (slotBox) slotBox.click();
                            }, 500);
                        }
                    }
                }, 500);
            }


            // Set min date to today

            // Set min date to today
            const dateInput = document.getElementById('bookingDate');
            const today = new Date().toISOString().split('T')[0];
            dateInput.min = today;
            dateInput.value = today;

            // Display dynamic fee
            const currentFee = getFee();
            document.getElementById('displayFee').textContent = `₹${currentFee.toFixed(2)}`;

            // Calculate estimated cost
            const startInput = document.getElementById('startTime');
            const endInput = document.getElementById('endTime');
            const durationSpan = document.getElementById('estDuration');
            const totalSpan = document.getElementById('estTotal');
            
            let finalCost = 0;
            let currentRate = 0;

            const calculateCost = () => {
                if (startInput.value && endInput.value && currentRate > 0) {
                    const start = new Date(`2000-01-01T${startInput.value}`);
                    const end = new Date(`2000-01-01T${endInput.value}`);
                    
                    let diffHrs = (end - start) / (1000 * 60 * 60);
                    if (diffHrs < 0) diffHrs += 24; // Handle passing midnight
                    
                    if (diffHrs > 0) {
                        const billableHours = Math.ceil(diffHrs); // Round up to nearest hour
                        finalCost = billableHours * currentRate;
                        durationSpan.textContent = `${diffHrs.toFixed(1)} hrs (Billable: ${billableHours}h)`;
                        totalSpan.textContent = `₹${finalCost.toFixed(2)}`;
                        return;
                    }
                }
                durationSpan.textContent = '-';
                totalSpan.textContent = '₹0.00';
                finalCost = 0;
            };

            window.updateRate = (rate) => {
                currentRate = parseFloat(rate);
                document.getElementById('displayFee').textContent = `₹${currentRate.toFixed(2)}/hr`;
                calculateCost();
            };

            startInput.addEventListener('change', calculateCost);
            endInput.addEventListener('change', calculateCost);

            // Handle submission
            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const slotId = document.getElementById('selectedSlotId').value;
                const vSelect = document.getElementById('vehicleNum');

                if (!slotId || !vSelect.value) {
                    showToast('Please select a slot and vehicle', 'error');
                    return;
                }


                const btn = e.target.querySelector('button');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                
                try {
                    const res = await fetch(`${API_BASE}/book-slot`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'x-user-id': currentUserId
                        },
                        body: JSON.stringify({
                            slot_id: slotId,
                            vehicle_id: vSelect.value,

                            city_id: document.getElementById('citySelect').value,
                            place_id: document.getElementById('placeSelect').value,
                            date: dateInput.value,
                            start_time: startInput.value,
                            end_time: endInput.value,
                            total_cost: finalCost.toFixed(2)
                        })

                    });

                    const result = await res.json();

                    if (result.status === 'success') {
                        btn.innerHTML = '<i class="fas fa-check"></i> Booked Successfully!';
                        btn.style.background = 'var(--success)';
                        showToast('Slot booked successfully!', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard-new.html';
                        }, 300);
                    } else {
                        btn.innerHTML = 'Confirm Booking';
                        showToast(result.message, 'error');
                    }
                } catch(err) {
                    btn.innerHTML = 'Confirm Booking';
                    showToast('Network error', 'error');
                }
            });
        });
    </script>
    <script>
        // Global helper functions
        async function loadSlotMap(placeId) {
            const API_BASE = getAPI_BASE();
            const grid = document.getElementById('slotGrid');
            const section = document.getElementById('slotMapSection');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center;"><i class="fas fa-spinner fa-spin"></i> Loading Map...</div>';
            section.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/slots/${placeId}`);
                const result = await res.json();
                if (result.status === 'success') {
                    grid.innerHTML = '';
                    if (result.data.length === 0) {
                        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">No slots available for this location.</div>';
                        return;
                    }
                    result.data.forEach(slot => {
                        const box = document.createElement('div');
                        box.className = `slot-box ${slot.status}`;
                        const isEV = slot.slot_type === 'ev';
                        box.innerHTML = `
                            <i class="fas ${isEV ? 'fa-charging-station' : (slot.vehicle_type === 'car' ? 'fa-car' : 'fa-motorcycle')}"></i>
                            <span>${slot.slot_number}</span>
                            ${isEV ? '<small style="font-size:0.6rem; color:#2ecc71; font-weight:bold;">EV ⚡</small>' : ''}
                            <div style="font-size:0.6rem; margin-top:2px;">₹${parseFloat(slot.price_per_hour).toFixed(0)}/hr</div>
                        `;
                        if (slot.status === 'available') {
                            box.onclick = () => selectSlot(slot.id, slot.slot_number, slot.price_per_hour, box);
                        }
                        grid.appendChild(box);
                    });
                }
            } catch (e) { 
                console.error(e);
                showToast('Error loading map', 'error'); 
            }
        }

        function selectSlot(id, number, rate, element) {
            // Deselect previous
            document.querySelectorAll('.slot-box').forEach(el => el.classList.remove('selected'));
            // Select new
            element.classList.add('selected');
            document.getElementById('selectedSlotId').value = id;
            document.getElementById('displaySlot').textContent = number;
            window.updateRate(rate);
        }
    </script>

</body>
</html>
