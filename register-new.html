<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartPark</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --park-teal: #0d7377;
            --park-dark: #143d59;
            --input-bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --overlay: rgba(233, 236, 239, 0.4);
        }

        [data-theme="dark"] {
            --park-teal: #14ffec;
            --park-dark: #0d7377;
            --input-bg: #2d3436;
            --card-bg: rgba(26, 26, 26, 0.95);
            --text-main: #ffffff;
            --text-sub: #b2bec3;
            --overlay: rgba(0, 0, 0, 0.7);
        }

        body {
            background: url('app_bg.png') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            z-index: 0;
            transition: background 0.3s ease;
        }

        .login-wrapper {
            background: var(--card-bg);
            width: 1100px;
            max-width: 95%;
            min-height: 700px;
            border-radius: 40px;
            display: flex;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            backdrop-filter: blur(10px);
            transition: background 0.3s ease;
        }

        .login-left {
            flex: 1.3;
            padding: 3.5rem 4rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .login-right {
            flex: 1;
            padding: 1.5rem;
            display: flex;
        }

        .image-container {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            overflow: hidden;
            background: rgba(0,0,0,0.05);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 30px;
        }

        .top-actions {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .action-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        [data-theme="dark"] .action-btn {
            background: rgba(0,0,0,0.4);
            color: var(--park-teal);
        }

        .action-btn:hover {
            background: var(--park-teal);
            color: white;
            transform: translateY(-3px);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-logo i {
            color: var(--park-teal);
            font-size: 1.8rem;
        }

        .welcome-text {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 2rem;
            color: var(--text-main);
        }

        .welcome-text span {
            color: var(--park-teal);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-sub);
        }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: none;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            transition: all 0.3s ease;
            color: var(--text-main);
        }

        .input-box:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--park-teal);
        }

        .login-btn {
            background: linear-gradient(135deg, var(--park-teal) 0%, var(--park-dark) 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 100%;
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #regMessage {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .register-link {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-sub);
            text-align: center;
        }

        .register-link a {
            color: var(--park-teal);
            text-decoration: none;
            font-weight: 700;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .login-wrapper {
                flex-direction: column;
                width: 95%;
                min-height: auto;
                border-radius: 25px;
                height: auto;
            }
            .login-right {
                display: none;
            }
            .login-left {
                padding: 2rem;
            }
            .welcome-text {
                font-size: 1.8rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .top-actions {
                top: 1rem;
                right: 1rem;
            }
            .action-btn {
                width: 40px;
                height: 40px;
            }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #dfe6e9; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-actions">
        <a href="index.html" class="action-btn" title="Back to Home"><i class="fas fa-home"></i></a>
        <div class="action-btn" id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></div>
    </div>

    <div class="login-wrapper">
        <div class="login-left">
            <div class="brand-logo">
                <i class="fas fa-parking"></i>
                SmartPark
            </div>

            <h1 class="welcome-text">Join the <span>Parking Network</span></h1>
            
            <div id="regMessage"></div>

            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="input-box" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="input-box" placeholder="johndoe123" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" id="vehicleNumber" class="input-box" placeholder="MH-12-AB-1234" required style="text-transform: uppercase;">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="input-box" placeholder="********" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-box" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">Create Account</button>
            </form>

            <div class="register-link">
                Already have an account? <a href="login-new.html">Sign in here</a>
            </div>
        </div>

        <div class="login-right">
            <div class="image-container">
                <img src="login_bg.png" alt="Modern car">
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_BASE = getAPI_BASE();

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            const icon = themeToggle.querySelector('i');
            if (newTheme === 'dark') {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        };

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const vehicleNumber = document.getElementById('vehicleNumber').value.trim().toUpperCase();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('regMessage');
            msgDiv.style.display = 'none';
            if (password !== confirmPassword) {
                msgDiv.textContent = 'Passwords do not match!';
                msgDiv.style.background = '#ffeaa7';
                msgDiv.style.color = '#d63031';
                msgDiv.style.display = 'block';
                return;
            }
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fullName, username: username, password: password, vehicle_number: vehicleNumber })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    msgDiv.textContent = 'Success! Redirecting...';
                    msgDiv.style.background = '#dff9fb';
                    msgDiv.style.color = '#009432';
                    msgDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = 'login-new.html'; }, 1500);
                } else {
                    msgDiv.textContent = result.message || 'Registration failed';
                    msgDiv.style.background = '#ffeaa7';
                    msgDiv.style.color = '#d63031';
                    msgDiv.style.display = 'block';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                msgDiv.textContent = 'Connection error';
                msgDiv.style.background = '#ffeaa7';
                msgDiv.style.color = '#d63031';
                msgDiv.style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
