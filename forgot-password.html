<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <a href="login-new.html" style="position: absolute; top: 2rem; left: 2rem; color: white; text-decoration: none; font-size: 1.2rem; z-index: 10;">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
        
        <div class="auth-card glass fade-in">
            <div class="auth-header">
                <i class="fas fa-key" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                <h2>Reset Password</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Verify your identity to set a new password</p>
            </div>
            
            <div id="statusMessage" style="padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; display: none; text-align: center; font-size: 0.9rem;"></div>

            <form id="resetForm">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder=" " required>
                    <label for="username" class="floating-label">Username</label>
                </div>

                <div class="form-group">
                    <input type="text" id="vehicleNumber" class="form-control" placeholder=" " required>
                    <label for="vehicleNumber" class="floating-label">Registered Vehicle Number</label>
                </div>
                
                <div class="form-group">
                    <input type="password" id="newPassword" class="form-control" placeholder=" " required>
                    <label for="newPassword" class="floating-label">New Password</label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_BASE = getAPI_BASE();

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const vehicle_number = document.getElementById('vehicleNumber').value.trim();
            const new_password = document.getElementById('newPassword').value;
            const statusDiv = document.getElementById('statusMessage');
            
            statusDiv.style.display = 'none';
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            
            try {
                const res = await fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, vehicle_number, new_password })
                });
                
                const result = await res.json();
                if (result.status === 'success') {
                    statusDiv.textContent = 'Password reset successful! You can now login.';
                    statusDiv.style.background = 'rgba(46, 213, 115, 0.1)';
                    statusDiv.style.color = '#2ed573';
                    statusDiv.style.border = '1px solid #2ed573';
                    statusDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login-new.html';
                    }, 2000);
                } else {
                    statusDiv.textContent = result.message || 'Verification failed';
                    statusDiv.style.background = 'rgba(255, 71, 87, 0.1)';
                    statusDiv.style.color = 'var(--danger)';
                    statusDiv.style.border = '1px solid var(--danger)';
                    statusDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (err) {
                statusDiv.textContent = 'Network error: ' + err.message;
                statusDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
