<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Portal - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-bg {
            background-image: url('assets/login-bg.jpg');
        }
        .admin-bg::before {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.8));
        }
        .admin-card {
            border-top: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="auth-container admin-bg">
        <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; color: white; text-decoration: none; font-size: 1.2rem; z-index: 10;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-card glass admin-card fade-in">
            <div class="auth-header">
                <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                <h2>Admin Portal</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Secure access for administrators</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <input type="text" id="adminId" class="form-control" placeholder=" " required>
                    <label for="adminId" class="floating-label">Admin ID or Email</label>
                </div>
                
                <div class="form-group">
                    <input type="password" id="adminPassword" class="form-control" placeholder=" " required>
                    <label for="adminPassword" class="floating-label">Admin Password</label>
                    <i class="fas fa-eye password-toggle"></i>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Access System</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const adminId = document.getElementById('adminId').value.trim();
            const adminPassword = document.getElementById('adminPassword').value;
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying Credentials...';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                
                console.log('Admin login: Sending request');
                const API_BASE = getAPI_BASE();
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: adminId, password: adminPassword }),
                    signal: controller.signal
                });
                
                console.log('Admin login: Got response, status:', res.status);
                clearTimeout(timeoutId);
                const result = await res.json();
                console.log('Admin login: Parsed response:', result);

                if (result.status === 'success') {
                    alert('Admin login successful! Redirecting...');
                    localStorage.setItem('user_id', result.data.id);
                    localStorage.setItem('username', result.data.username);
                    localStorage.setItem('user_name', result.data.name);
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert(result.message);
                    btn.innerHTML = originalText;
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    alert('Request timeout - please try again');
                } else {
                    alert('Network error: ' + err.message);
                }
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
