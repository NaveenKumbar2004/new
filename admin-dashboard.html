<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
        }
        .admin-nav {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--primary-color);
        }
        .admin-container {
            padding: 6rem 5% 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-color);
        }
        th {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .action-btn {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="dashboard-bg">
    <nav class="navbar admin-nav">
        <a href="admin-dashboard.html" class="nav-brand">
            <i class="fas fa-shield-alt" style="color: var(--primary-color);"></i>
            Admin Portal
        </a>
        <div class="nav-links">
            <a href="admin-locations.html" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fas fa-map-marker-alt"></i> Locations</a>
            <a href="admin-verify.html" class="btn btn-primary" style="padding: 0.5rem 1rem;"><i class="fas fa-search"></i> Verify Entry</a>
            <button id="themeToggle" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;">
                <i class="fas fa-moon"></i>
            </button>
            <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>

    </nav>

    <div class="admin-container fade-in">
        <h2 style="margin-bottom: 2rem;">System Management</h2>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; margin-bottom: 2rem;">
            <!-- Settings Section -->
            <div class="admin-section glass">
                <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;"><i class="fas fa-cog"></i> Global Settings</h3>
                <div style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <input type="number" step="0.01" id="feeInput" class="form-control" required>
                        <label for="feeInput" class="floating-label" style="top: 0; font-size: 0.8rem; color: var(--primary-color);">Parking Fee Per Hour (₹)</label>
                    </div>
                    <button class="btn btn-primary" onclick="window.saveFee(event)">Update</button>
                </div>
            </div>

            <!-- Add Slot Section -->
            <div class="admin-section glass">
                <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;"><i class="fas fa-plus-circle"></i> Add Parking Slot</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 0.8fr 0.7fr; gap: 1rem; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="slotCitySelect" class="form-control" required>
                            <option value="" disabled selected>City</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="slotPlaceSelect" class="form-control" required disabled>
                            <option value="" disabled selected>Area</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="text" id="newSlotId" class="form-control" placeholder="A1" required style="text-transform: uppercase;">
                    </div>
                    <button class="btn btn-primary" onclick="addNewSlot()">Add</button>
                </div>
            </div>
        </div>


        <!-- Slot Management Table -->
        <div class="admin-section glass">
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;"><i class="fas fa-th"></i> Manage Slots</h3>
            <div style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Slot ID</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="slotsTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Bookings Section -->
        <div class="admin-section glass">
            <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;"><i class="fas fa-list-alt"></i> Recent Bookings</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Booking ID</th>
                            <th>User / Vehicle</th>
                            <th>Location</th>
                            <th>Slot</th>
                            <th>Date / Time</th>
                            <th>Cost</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>

                    </thead>
                    <tbody id="bookingsTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script>
        // Set API_BASE on window to ensure it's globally accessible but not redeclared as const
        window.API_BASE = getAPI_BASE();

        document.addEventListener('DOMContentLoaded', async () => {
            initDB(); 
            
            // Sync current fee from server
            const serverFee = await fetchSettingsFromServer();
            document.getElementById('feeInput').value = serverFee;
            
            initLocationSelectors();
            renderAdminBookings();
        });

        async function initLocationSelectors() {
            try {
                const res = await fetch(`${window.API_BASE}/cities`);
                const result = await res.json();
                const citySelect = document.getElementById('slotCitySelect');
                const placeSelect = document.getElementById('slotPlaceSelect');

                if (result.status === 'success') {
                    result.data.forEach(city => {
                        const opt = document.createElement('option');
                        opt.value = city.id;
                        opt.textContent = city.name;
                        citySelect.appendChild(opt);
                    });
                }

                citySelect.addEventListener('change', async () => {
                    const cityId = citySelect.value;
                    placeSelect.innerHTML = '<option value="" disabled selected>Area</option>';
                    placeSelect.disabled = true;

                    if (cityId) {
                        const pRes = await fetch(`${window.API_BASE}/places/${cityId}`);
                        const pResult = await pRes.json();
                        if (pResult.status === 'success') {
                            pResult.data.forEach(place => {
                                const opt = document.createElement('option');
                                opt.value = place.id;
                                opt.textContent = place.name;
                                placeSelect.appendChild(opt);
                            });
                            placeSelect.disabled = false;
                        }
                    }
                });

                placeSelect.addEventListener('change', () => {
                    renderAdminSlots(placeSelect.value);
                });

            } catch (e) { console.error(e); }
        }


        window.saveFee = async (e) => {
            const btn = e.target;
            const originalText = btn.innerHTML;
            const newFee = document.getElementById('feeInput').value;
            
            if (newFee && newFee > 0) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
                btn.disabled = true;
                
                const success = await updateFeeOnServer(newFee);
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                if (success) {
                    showToast('✅ Database Updated: Parking fee set to ₹' + newFee, 'success');
                } else {
                    showToast('❌ Update Failed', 'error');
                }
            } else {
                showToast('Invalid fee amount', 'error');
            }
        };


        window.addNewSlot = async () => {
            const slotInput = document.getElementById('newSlotId');
            const placeSelect = document.getElementById('slotPlaceSelect');
            const slotId = slotInput.value.trim().toUpperCase();
            
            if (!placeSelect.value) {
                showToast('Please select an area first', 'error');
                return;
            }
            if (!slotId) {
                showToast('Slot number cannot be empty', 'error');
                return;
            }

            try {
                const res = await fetch(`${window.API_BASE}/add-slot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ place_id: placeSelect.value, slot_number: slotId, type: 'car' })
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    showToast(`Slot ${slotId} added successfully`, 'success');
                    slotInput.value = '';
                    renderAdminSlots(placeSelect.value);
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                showToast('Failed to add slot', 'error');
            }
        };


        window.removeSlot = async (slotId, placeId) => {
            if (!confirm(`Are you sure you want to delete this slot?`)) return;

            try {
                const res = await fetch(`${window.API_BASE}/delete-slot/${slotId}`, {
                    method: 'DELETE'
                });
                const result = await res.json();

                if (result.status === 'success') {
                    showToast(`Slot deleted`, 'success');
                    renderAdminSlots(placeId);
                } else {
                    alert(result.message || 'Failed to delete slot');
                }
            } catch (err) {
                showToast('Failed to delete slot', 'error');
            }
        };


        const renderAdminSlots = async (placeId) => {
            const tbody = document.getElementById('slotsTableBody');
            if (!placeId) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Please select an area to manage slots</td></tr>';
                return;
            }
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';

            
            try {
                const res = await fetch(`${window.API_BASE}/slots/${placeId}`);
                const result = await res.json();
                
                if(result.status === 'success') {
                    tbody.innerHTML = '';
                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No slots found in this area</td></tr>';
                        return;
                    }
                    result.data.forEach(slot => {
                        const tr = document.createElement('tr');
                        const statusColor = slot.status === 'available' ? 'var(--success)' : 'var(--danger)';
                        
                        tr.innerHTML = `
                            <td style="font-weight: 600;">${slot.slot_number}</td>
                            <td><span class="badge" style="background: var(--glass-bg);">${slot.type.toUpperCase()}</span></td>
                            <td><span style="color: ${statusColor}; font-weight: 500;">${slot.status.toUpperCase()}</span></td>
                            <td>
                                <button class="btn btn-outline action-btn delete-btn" style="color: var(--danger); border-color: var(--danger);">Delete</button>
                            </td>
                        `;

                        tr.querySelector('.delete-btn').addEventListener('click', () => {
                            window.removeSlot(slot.id, placeId);
                        });

                        tbody.appendChild(tr);
                    });
                }
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--danger);">Failed to load slots.</td></tr>';
            }
        };


        const renderAdminBookings = async () => {
            const tbody = document.getElementById('bookingsTableBody');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
            
            try {
                const res = await fetch(`${window.API_BASE}/bookings`);
                const result = await res.json();

                if(result.status === 'success') {
                    tbody.innerHTML = '';
                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--text-muted);">No bookings found</td></tr>';
                        return;
                    }

                    result.data.forEach(booking => {
                        const tr = document.createElement('tr');
                        let statusColor = 'var(--text-muted)';
                        if (booking.entry_status === 'entered') statusColor = 'var(--success)';
                        if (booking.entry_status === 'exited') statusColor = 'var(--primary-color)';
                        if (booking.entry_status === 'pending') statusColor = '#856404';

                        const location = (booking.city_name && booking.place_name) 
                            ? `${booking.city_name} - ${booking.place_name}`
                            : 'N/A';
                        
                        tr.innerHTML = `
                            <td style="font-family: monospace; font-size: 0.8rem;">${booking.id}</td>
                            <td style="font-weight: 500;">${booking.user_name || 'User'} <br> <small style="color:var(--text-muted)">${booking.vehicle_number || ''}</small></td>
                            <td><small>${location}</small></td>
                            <td style="font-weight: 600; color: var(--primary-color);">${booking.slot_number}</td>
                            <td><small>${new Date(booking.date).toLocaleDateString()}<br>${booking.start_time.substring(0,5)} - ${booking.end_time.substring(0,5)}</small></td>
                            <td style="font-weight: 600;">₹${parseFloat(booking.total_cost).toFixed(2)}</td>
                            <td><span style="color: ${statusColor}; font-size: 0.85rem; font-weight: bold;">${booking.entry_status.toUpperCase()}</span></td>
                            <td>
                                ${booking.entry_status === 'pending' ? `<button class="btn btn-primary action-btn" onclick="verifyEntry('${booking.id}')">Entry</button>` : ''}
                                ${booking.entry_status === 'entered' ? `<button class="btn btn-outline action-btn" style="color: var(--danger); border-color: var(--danger);" onclick="markExit('${booking.id}')">Exit</button>` : ''}
                            </td>
                        `;

                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error("Booking load error:", err);
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--danger);">Failed to load bookings from server</td></tr>';
            }
        };


        window.verifyEntry = async (bookingId) => {
            if (!confirm(`Verify entry for booking ${bookingId}?`)) return;
            try {
                const res = await fetch(`${window.API_BASE}/verify-entry`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: bookingId })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast('Vehicle marked as Entered', 'success');
                    renderAdminBookings();
                }
            } catch (err) {
                showToast('Failed to verify entry', 'error');
            }
        };

        window.markExit = async (bookingId) => {
            if (!confirm(`Mark exit and free slot for booking ${bookingId}?`)) return;
            try {
                const res = await fetch(`${window.API_BASE}/mark-exit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: bookingId })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast('Vehicle marked as Exited and slot freed', 'success');
                    renderAdminBookings();
                    renderAdminSlots();
                }
            } catch (err) {
                showToast('Failed to mark exit', 'error');
            }
        };
    </script>

</body>
</html>
