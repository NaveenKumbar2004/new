<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Dashboard - Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
        }
        
        .dashboard-nav {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }
    </style>
</head>
<body class="dashboard-bg">
    <nav class="navbar glass">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-parking" style="color: var(--primary-color);"></i>
            SmartPark
        </a>
        <div class="nav-links" id="navLinks">
            <!-- Populated by JS -->
        </div>
    </nav>

    <div class="dashboard-container fade-in">
        <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem;">
            <div>
                <h2>Live Parking Map</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Select a location to view real-time availability</p>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <div class="form-group" style="margin-bottom: 0; min-width: 180px;">
                        <select id="dashCitySelect" class="form-control" style="padding: 0.6rem 1rem;">
                            <option value="" disabled selected>Select City</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0; min-width: 180px;">
                        <select id="dashPlaceSelect" class="form-control" style="padding: 0.6rem 1rem;" disabled>
                            <option value="" disabled selected>Select Area</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 1.5rem; padding-bottom: 0.5rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--success);"></span>
                    <span style="font-size: 0.9rem; color: var(--text-muted);">Available</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--danger);"></span>
                    <span style="font-size: 0.9rem; color: var(--text-muted);">Occupied</span>
                </div>
            </div>
        </div>


        <div class="slots-grid" id="slotsGrid">
            <!-- Slots will be populated by JS -->
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_BASE = getAPI_BASE();

        document.addEventListener('DOMContentLoaded', () => {
            const userId = localStorage.getItem('user_id');
            const userName = localStorage.getItem('user_name');
            const navLinks = document.getElementById('navLinks');

            if (userId) {
                navLinks.innerHTML = `
                    <span style="margin-right: 1rem; font-weight: 500;">Hi, ${userName}</span>
                    <a href="booking-new.html" class="btn btn-primary" style="padding: 0.5rem 1rem;"><i class="fas fa-plus mr-2"></i> Book Slot</a>
                    <a href="my-bookings-new.html" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fas fa-list-ul"></i> My Bookings</a>
                    <a href="my-vehicles-new.html" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fas fa-car"></i> My Vehicles</a>
                    <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
                    <button id="themeToggle" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;">
                        <i class="fas fa-moon"></i>
                    </button>
                `;

            } else {
                navLinks.innerHTML = `
                    <a href="login-new.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Login</a>
                    <button id="themeToggle" class="btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;">
                        <i class="fas fa-moon"></i>
                    </button>
                `;
            }

            initLocationFilters();
            
            // Auto-refresh logic if a place is selected
            setInterval(() => {
                const placeId = document.getElementById('dashPlaceSelect').value;
                if (placeId) fetchSlots(placeId);
            }, 5000);
        });

        async function initLocationFilters() {
            try {
                const res = await fetch(`${API_BASE}/cities`);
                const result = await res.json();
                const citySelect = document.getElementById('dashCitySelect');
                const placeSelect = document.getElementById('dashPlaceSelect');

                if (result.status === 'success') {
                    result.data.forEach(city => {
                        const opt = document.createElement('option');
                        opt.value = city.id;
                        opt.textContent = city.name;
                        citySelect.appendChild(opt);
                    });
                }

                citySelect.addEventListener('change', async () => {
                    const cityId = citySelect.value;
                    placeSelect.innerHTML = '<option value="" disabled selected>Select Area</option>';
                    placeSelect.disabled = true;
                    document.getElementById('slotsGrid').innerHTML = '<div style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">Please select an area to view slots.</div>';

                    if (cityId) {
                        const pRes = await fetch(`${API_BASE}/places/${cityId}`);
                        const pResult = await pRes.json();
                        if (pResult.status === 'success') {
                            pResult.data.forEach(place => {
                                const opt = document.createElement('option');
                                opt.value = place.id;
                                opt.textContent = place.name;
                                placeSelect.appendChild(opt);
                            });
                            placeSelect.disabled = false;
                        }
                    }
                });

                placeSelect.addEventListener('change', () => {
                    fetchSlots(placeSelect.value);
                });

            } catch (e) { console.error(e); }
        }


        function logout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('user_name');
            window.location.href = 'login-new.html';
        }

        const fetchSlots = async (placeId) => {
            const grid = document.getElementById('slotsGrid');
            if (!placeId) {
                grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">Please select an area to view slots.</div>';
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/slots/${placeId}`);
                const result = await res.json();
                
                if (result.status === 'success') {
                    grid.innerHTML = '';
                    if (result.data.length === 0) {
                        grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">No slots added for this location yet.</div>';
                        return;
                    }
                    result.data.forEach((slot, index) => {
                        const card = document.createElement('div');
                        card.className = `slot-card glass ${slot.status}`;
                        card.style.animationDelay = `${Math.min(index * 0.05, 1)}s`;
                        card.classList.add('fade-in');
                        
                        const isEV = slot.slot_type === 'ev';
                        const vIcon = slot.vehicle_type === 'bike' ? 'fa-motorcycle' : 'fa-car';
                        const statusText = slot.status === 'available' ? 'Available' : 'Occupied';
                        
                        card.innerHTML = `
                            <div class="slot-icon" style="color: ${slot.status === 'available' ? 'var(--success)' : 'var(--danger)'}; position: relative;">
                                <i class="fas ${slot.status === 'available' ? (isEV ? 'fa-charging-station' : 'fa-parking') : vIcon}"></i>
                                ${isEV ? '<i class="fas fa-bolt" style="position: absolute; top: -5px; right: -5px; font-size: 0.8rem; color: #f1c40f;"></i>' : ''}
                            </div>
                            <div>
                                <h3 style="margin-bottom: 0.3rem; color: var(--text-color); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                                    Slot ${slot.slot_number}
                                    ${isEV ? '<span style="font-size: 0.6rem; background: #2ecc71; color: white; padding: 2px 5px; border-radius: 4px;">EV</span>' : ''}
                                </h3>
                                <span class="slot-status status-${slot.status}">${statusText}</span>
                                <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem;">₹${parseFloat(slot.price_per_hour).toFixed(0)}/hr</div>
                            </div>
                        `;

                        if (slot.status === 'available') {
                            card.addEventListener('click', () => {
                                window.location.href = `booking-new.html?city=${document.getElementById('dashCitySelect').value}&place=${placeId}&slot=${slot.id}`;
                            });
                        } else {
                            card.style.cursor = 'not-allowed';
                        }

                        grid.appendChild(card);
                    });
                }
            } catch(e) {
                grid.innerHTML = '<div style="color: var(--danger); text-align: center; grid-column: 1/-1;">Failed to load slots from server.</div>';
            }
        };

    </script>
</body>
</html>
